name: ui-lib

x-api-build: &api-build
  context: .
  target: api

x-api-env: &api-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-pass}@postgres:5432/${POSTGRES_DB:-social_app}
  JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB: ${POSTGRES_DB:-social_app}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build: *api-build
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:api-${IMAGE_TAG:-latest}
    environment:
      <<: *api-env
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: *api-build
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:api-${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *api-env
      USER_SERVICE_PORT: 3001
    command: ["node", "src/services/user-server.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  vlog-service:
    build: *api-build
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:api-${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *api-env
      VLOG_SERVICE_PORT: 3002
      RABBITMQ_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_QUEUE: notifications.events
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      NOTIFICATION_INTERNAL_SECRET: ${NOTIFICATION_INTERNAL_SECRET:-dev-notification-secret}
    command: ["node", "src/services/vlog-server.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  task-service:
    build: *api-build
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:api-${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *api-env
      TASK_SERVICE_PORT: 3004
    command: ["node", "src/services/task-server.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3004/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-service:
    build: *api-build
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:api-${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      <<: *api-env
      NOTIFICATION_SERVICE_PORT: 3006
      RABBITMQ_URL: http://rabbitmq:15672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_QUEUE: notifications.events
      NOTIFICATION_INTERNAL_SECRET: ${NOTIFICATION_INTERNAL_SECRET:-dev-notification-secret}
    command: ["node", "src/services/notification-server.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3006/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build: *api-build
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:api-${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-production}
      GATEWAY_PORT: 3003
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5174}
      USER_SERVICE_URL: http://user-service:3001
      VLOG_SERVICE_URL: http://vlog-service:3002
      TASK_SERVICE_URL: http://task-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    command: ["node", "src/services/gateway-server.js"]
    ports:
      - "3005:3003"
    depends_on:
      user-service:
        condition: service_healthy
      vlog-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: .
      target: client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3005/api}
    image: ${DOCKER_REPOSITORY:-myngaa/myngaaa}:client-${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:

  
